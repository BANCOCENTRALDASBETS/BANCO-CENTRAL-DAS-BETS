<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Acesso Grátis - Bônus de Cadastro</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #1b5e20, #4caf50);
        margin: 0;
        min-height: 100vh;
        text-align: center;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 15px;
    }

    .landing-box {
        background: #fff8e1;
        padding: 25px 20px;
        width: 100%;
        max-width: 360px;
        border-radius: 18px;
        box-shadow: 0 6px 15px rgba(0,0,0,0.25);
    }

    .landing-box h2 {
        font-size: 20px;
        margin-bottom: 15px;
        color: #0d5302;
        line-height: 1.4;
    }

    input {
        width: 100%;
        padding: 14px;
        margin: 8px 0;
        border-radius: 12px;
        border: 2px solid #0d5302;
        font-size: 16px;
    }

    button {
        width: 100%;
        padding: 16px;
        margin-top: 15px;
        border: none;
        border-radius: 12px;
        background: #ff6f00;
        color: white;
        font-size: 18px;
        cursor: pointer;
        font-weight: bold;
        transition: all 0.3s ease-in-out;
        animation: pulse 1.5s infinite;
    }

    button:disabled {
        background: gray;
        cursor: not-allowed;
        animation: none;
    }

    @keyframes pulse {
        0% { box-shadow: 0 0 8px #ff6f00; }
        50% { box-shadow: 0 0 18px #ff8f00; }
        100% { box-shadow: 0 0 8px #ff6f00; }
    }
</style>
</head>
<body>

<div class="landing-box">
    <h2>
        Deixe Seu Nome e Telefone<br>
        e Tenha Acesso Grátis ao Nosso Site
    </h2>
    <input type="text" id="nome" placeholder="Seu Nome">
    <input type="tel" id="telefone" placeholder="DDD + Telefone">
    <button type="button" id="entrar" onclick="entrarSite()" disabled>Entrar</button>
</div>

<script>
const nomeInput = document.getElementById("nome");
const telefoneInput = document.getElementById("telefone");
const entrarBtn = document.getElementById("entrar");

function checarCampos() {
    entrarBtn.disabled = !(nomeInput.value.trim() && telefoneInput.value.trim());
}

nomeInput.addEventListener("input", checarCampos);
telefoneInput.addEventListener("input", checarCampos);

function entrarSite() {
    const nome = nomeInput.value.trim();
    const telefone = telefoneInput.value.trim();

    if (!nome || !telefone) {
        alert("Preencha todos os campos!");
        return;
    }

    localStorage.setItem("usuarioCadastrado", "true");
    localStorage.setItem("nome", nome);
    localStorage.setItem("telefone", telefone);

    window.location.href = "site.html";
}

if (localStorage.getItem("usuarioCadastrado") === "true") {
    window.location.href = "site.html";
}

entrarBtn.disabled = true;
</script>

</body>
</html>
