<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Portal Gamer</title>
  <style>
    body {
      background-color: #0f0f0f;
      color: #00ffcc;
      font-family: 'Orbitron', sans-serif;
      text-align: center;
      padding: 50px;
    }
    input, button {
      padding: 10px;
      margin: 10px;
      border: none;
      border-radius: 5px;
      font-size: 16px;
    }
    input {
      background-color: #1a1a1a;
      color: #00ffcc;
      width: 250px;
    }
    button {
      background-color: #00ffcc;
      color: #0f0f0f;
      cursor: pointer;
    }
    button:disabled {
      background-color: #555;
      cursor: not-allowed;
    }
    #honeypot {
      display: none;
    }
  </style>
</head>
<body>
  <h1>🎮 Bem-vindo ao Portal Gamer</h1>
  <p>Insira seus dados para entrar:</p>

  <input type="text" id="nome" placeholder="Seu nome">
  <br>
  <input type="text" id="telefone" placeholder="Seu telefone (ex: 11999999999)">
  <br>
  <input type="text" id="honeypot" name="honeypot">
  <br>
  <button id="entrarBtn" disabled>Entrar</button>

  <script>
    const nomeInput = document.getElementById("nome");
    const telefoneInput = document.getElementById("telefone");
    const entrarBtn = document.getElementById("entrarBtn");

    function validarTelefone(telefone) {
      return /^\d{10,11}$/.test(telefone);
    }

    function checarCampos() {
      const nomeValido = nomeInput.value.trim().length > 0;
      const telefoneValido = validarTelefone(telefoneInput.value.trim());
      const honeypotVazio = document.getElementById("honeypot").value === "";

      entrarBtn.disabled = !(nomeValido && telefoneValido && honeypotVazio);
    }

    nomeInput.addEventListener("input", checarCampos);
    telefoneInput.addEventListener("input", checarCampos);

    entrarBtn.addEventListener("click", function () {
      const nome = nomeInput.value.trim();
      const telefone = telefoneInput.value.trim();
      const honeypot = document.getElementById("honeypot").value;

      if (honeypot) {
        alert("Ação bloqueada por segurança.");
        return;
      }

      if (!nome || !validarTelefone(telefone)) {
        alert("Preencha os campos corretamente!");
        return;
      }

      localStorage.setItem("usuarioCadastrado", "true");
      localStorage.setItem("nome", nome);
      localStorage.setItem("telefone", telefone);

      window.location.href = "site.html";
    });
  </script>
</body>
</html>
