<!-- site.html -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal Gamer - Área VIP</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet" />
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Orbitron', sans-serif;
      background: linear-gradient(135deg, #0a0a0a, #1a1a1a);
      color: #00ffcc;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    .vip-box {
      background: #1e1e1e;
      padding: 25px;
      border-radius: 20px;
      box-shadow: 0 0 20px #ff6f00;
      width: 100%;
      max-width: 360px;
      text-align: center;
      margin-top: 40px;
      border: 2px solid #ff6f00;
    }

    .vip-box h1 {
      font-size: 22px;
      margin-bottom: 20px;
      color: #ff6f00;
    }

    .vip-box p {
      font-size: 16px;
      margin-bottom: 20px;
    }

    .vip-box input {
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      border: 12px solid transparent;
      border-image: url('moedas-bcb.png') 30 round;
      background: #2c2c2c;
      color: #fff;
      font-size: 16px;
    }

    .vip-box button {
      width: 100%;
      padding: 16px;
      margin-top: 20px;
      border: none;
      border-radius: 12px;
      background: #ff6f00;
      color: white;
      font-size: 18px;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="vip-box">
    <h1>🎮 Bem-vindo, Gamer VIP!</h1>
    <p>Você desbloqueou o acesso ao universo $BCB$.</p>
    <input type="text" placeholder="Digite seu código secreto" />
    <button>Validar Código</button>
  </div>
</body>
</html>
