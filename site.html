<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Banco Central das Bets - Plataformas com Bônus</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f1f8e9;
        margin: 0;
        padding: 10px;
    }

    .container {
        max-width: 500px;
        margin: auto;
    }

    h1 {
        font-size: 22px;
        color: #1b5e20;
        text-align: center;
        margin-bottom: 15px;
    }

    .link-box {
        background: white;
        border-radius: 12px;
        padding: 15px;
        margin: 12px 0;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .link-box a {
        display: block;
        text-decoration: none;
        color: #0d5302;
        font-weight: bold;
        font-size: 16px;
        margin-bottom: 10px;
    }

    textarea {
        width: 100%;
        border-radius: 8px;
        border: 1px solid #ccc;
        padding: 8px;
        font-size: 14px;
        resize: none;
        margin-bottom: 6px;
    }

    button {
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 8px;
        background: #43a047;
        color: white;
        font-size: 16px;
        cursor: pointer;
    }
</style>
</head>
<body>

<div class="container">
    <h1>Plataformas com Bônus no Cadastro</h1>

    <div id="links-container"></div>
</div>

<script>
const links = [
    "https://56bx2.com/?pid=1622043487",
    "https://www.56f5.com/?pid=1944788621",
    "https://0697.0697neiqian22.win/?pid=3935845434",
    "https://9z00.com/?pid=1936443426",
    "https://79r777.vip/?pid=2196766126",
    "https://98a5.xyz/?pid=1803452060",
    "https://79m004.com/?pid=1757781391",
    "https://79b03.com/?pid=2850060734",
    "https://67a01.com/?pid=2241000318",
    "https://95bb2.com/?pid=1530670278"
];

const container = document.getElementById("links-container");

links.forEach((url, index) => {
    const box = document.createElement("div");
    box.className = "link-box";
    box.innerHTML = `
        <a href="${url}" target="_blank">🔗 Plataforma ${index + 1}</a>
        <textarea id="comentario-${index}" placeholder="Deixe seu comentário..."></textarea>
        <button onclick="salvarComentario(${index})">Enviar Comentário</button>
    `;
    container.appendChild(box);
});

function salvarComentario(index) {
    const textarea = document.getElementById("comentario-" + index);
    const comentario = textarea.value.trim();
    if (!comentario) {
        alert("Digite um comentário antes de enviar.");
        return;
    }
    const nome = localStorage.getItem("nome") || "Anônimo";
    alert("Obrigado, " + nome + "! Seu comentário foi registrado: " + comentario);
    textarea.value = "";
}
</script>

</body>
</html>
